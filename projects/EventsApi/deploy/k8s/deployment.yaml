apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-api
  namespace: events-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: events-api
  template:
    metadata:
      labels:
        app: events-api
    spec:
      containers:
        - name: events-api
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__EventsCatalog
              value: Data Source=/data/events.db
            - name: Jwt__Issuer
              value: EventsApi
            - name: Jwt__Audience
              value: EventsFrontend
            - name: Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: events-api-secrets
                  key: jwt-signing-key
            - name: SeedData__AdminEmail
              value: admin@events.local
            - name: SeedData__AdminDisplayName
              value: Platform Admin
            - name: SeedData__AdminPassword
              valueFrom:
                secretKeyRef:
                  name: events-api-secrets
                  key: admin-password
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: events-api-data
