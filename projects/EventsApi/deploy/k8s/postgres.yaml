apiVersion: v1
kind: Service
metadata:
  name: events-postgres
  namespace: events-api
spec:
  selector:
    app: events-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-postgres
  namespace: events-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: events-postgres
  template:
    metadata:
      labels:
        app: events-postgres
    spec:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:18
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: events
            - name: POSTGRES_USER
              value: events_api
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: events-api-secrets
                  key: db-password
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - events_api
                - -d
                - events
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - events_api
                - -d
                - events
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: events-postgres-data