name: events-api-ci-cd

on:
  pull_request:
    paths:
      - 'projects/EventsApi/**'
      - '.github/workflows/events-api-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/EventsApi/**'
      - '.github/workflows/events-api-ci-cd.yml'

permissions:
  contents: read
  packages: write

env:
  PROJECT_PATH: projects/EventsApi
  IMAGE_NAME: harbor.de-4.biatec.io/biatec/events-api

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}/events.slnx

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }}/events.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.PROJECT_PATH }}/events.slnx --configuration Release --no-build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.de-4.biatec.io
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./projects
          file: ./${{ env.PROJECT_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker
    env:
      IMAGE_REF: harbor.de-4.biatec.io/biatec/events-api:sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_DATA }}" ] || [ -z "${{ secrets.EVENTS_API_DB_PASSWORD }}" ] || [ -z "${{ secrets.EVENTS_API_JWT_SIGNING_KEY }}" ] || [ -z "${{ secrets.EVENTS_API_ADMIN_PASSWORD }}" ]; then
            echo "Required secrets are not set. Skipping deployment."
            exit 1
          fi

      - name: Validate deployment database configuration
        run: |
          if grep -q "Data Source=" ${{ env.PROJECT_PATH }}/deploy/k8s/deployment.yaml; then
            echo "Production deployment must not use a SQLite Data Source connection string."
            exit 1
          fi
          if grep -q "db-connection-string" ${{ env.PROJECT_PATH }}/deploy/k8s/deployment.yaml; then
            echo "Production deployment must build ConnectionStrings__EventsCatalog from db-password, not a full connection-string secret."
            exit 1
          fi
          if ! grep -q "events-postgres" ${{ env.PROJECT_PATH }}/deploy/k8s/deployment.yaml; then
            echo "Production deployment must connect to the in-cluster events-postgres service."
            exit 1
          fi
          if ! grep -q "postgres:18" ${{ env.PROJECT_PATH }}/deploy/k8s/postgres.yaml; then
            echo "Production PostgreSQL deployment must use PostgreSQL 18."
            exit 1
          fi
          if ! grep -q "runAsUser: 999" ${{ env.PROJECT_PATH }}/deploy/k8s/postgres.yaml; then
            echo "Production PostgreSQL deployment must run as the postgres user to avoid PVC chown failures."
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > ~/.kube/config

      - name: Apply namespace
        run: |
          kubectl apply -f ${{ env.PROJECT_PATH }}/deploy/k8s/namespace.yaml

      - name: Create or update application secrets
        env:
          DB_PASSWORD: ${{ secrets.EVENTS_API_DB_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.EVENTS_API_JWT_SIGNING_KEY }}
          ADMIN_PASSWORD: ${{ secrets.EVENTS_API_ADMIN_PASSWORD }}
        run: |
          kubectl create secret generic events-api-secrets \
            --namespace events-api \
            --from-literal=db-password="$DB_PASSWORD" \
            --from-literal=jwt-signing-key="$JWT_SIGNING_KEY" \
            --from-literal=admin-password="$ADMIN_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f ${{ env.PROJECT_PATH }}/deploy/k8s/persistent-volume-claim.yaml
          kubectl apply -f ${{ env.PROJECT_PATH }}/deploy/k8s/postgres.yaml
          kubectl rollout status deployment/events-postgres --namespace events-api

      - name: Deploy application
        run: |
          sed "s|IMAGE_PLACEHOLDER|${IMAGE_REF}|g" ${{ env.PROJECT_PATH }}/deploy/k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f ${{ env.PROJECT_PATH }}/deploy/k8s/service.yaml
          kubectl apply -f ${{ env.PROJECT_PATH }}/deploy/k8s/ingress.yaml

      - name: Verify rollout
        run: kubectl rollout status deployment/events-api --namespace events-api
